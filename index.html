<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chunjie Wang – Architecture Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'IBM Plex Sans', sans-serif;
      overflow-x: hidden;
    }

    body {
      color: #fff;
      position: relative;
    }

    /* Fullscreen background video */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .content-wrapper {
      position: relative;
      z-index: 1;
      padding: 80px 20px 40px;
      text-align: center;
      background: rgba(0, 0, 0, 0.4); /* optional overlay for better readability */
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 600;
    }

    header p {
      max-width: 600px;
      margin: 20px auto 0;
      font-size: 1.1rem;
    }

    section {
      padding: 60px 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 20px;
      padding-bottom: 20px;
    }

    .carousel img {
      max-height: 400px;
      width: auto;
      scroll-snap-align: center;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .info-block {
      margin-top: 40px;
    }

    .info-block h2 {
      font-weight: 600;
      font-size: 1.4rem;
      margin-bottom: 10px;
    }

    .info-block p {
      margin: 0;
    }

    footer {
      background: rgba(0, 0, 0, 0.6);
      padding: 40px 20px;
      text-align: center;
      font-size: 0.95rem;
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- Background Video -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4" />
  </video>

  <div class="content-wrapper">
    <header>
      <h1>Chunjie Wang</h1>
      <p>Airport as an iconic building and first landmark while entering a city</p>
    </header>

    <section>
      <div class="carousel">
        <img src="data:image/jpeg;base64,...YOUR_BASE64_IMAGE_DATA_HERE..." alt="Project Image" />
      </div>

      <div class="info-block">
        <h2>Research Themes</h2>
        <p>Circulation, urban landscape, drift</p>
      </div>

      <div class="info-block">
        <h2>Design Interests</h2>
        <p>Sound design, video showing, interactive</p>
      </div>

      <div class="info-block">
        <h2>Tools & Software</h2>
        <p>Rhino, D5, C4D</p>
      </div>
    </section>
  </div>

  <footer>
    Contact: chunjie_wang@sciarc.edu
  </footer>
</body>
</html>
